server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 1. ЗАХИСТ: Сек'юріті хедери
    # Забороняє вбудовувати твій сайт у <iframe> на інших сайтах (захист від Clickjacking)
    add_header X-Frame-Options "SAMEORIGIN";
    # Блокує завантаження сторінки, якщо браузер виявляє XSS-атаку
    add_header X-XSS-Protection "1; mode=block";
    # Забороняє браузеру вгадувати тип контенту (захист від підміни MIME-типів)
    add_header X-Content-Type-Options "nosniff";
    # Контролює, яку інформацію про джерело переходу передавати на інші сайти
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # 2. ОПТИМІЗАЦІЯ: Gzip стиснення
    # Стискає текстові файли (HTML, CSS, JS) перед відправкою, зменшуючи трафік на 70%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 3. МАРШРУТИЗАЦІЯ: Налаштування для React SPA
    # Якщо файл не знайдено, Nginx віддає index.html, щоб React Router міг обробити посилання
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 4. КЕШУВАННЯ: Оптимізація статики
    # Браузер буде кешувати картинки, шрифти та скомпільовані стилі на 1 рік
    location ~* \.(?:css|js|jpg|svg|png|jpeg|gif|ico|woff2?|eot|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 5. ПРОКСІЮВАННЯ API: Щоб фронтенд міг безпечно стукати на бекенд
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
