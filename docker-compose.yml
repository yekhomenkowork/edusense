services:
  db:
    image: postgres:15-alpine
    container_name: edusense_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d # Автоматичне створення таблиць
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: iegomez/mosquitto-go-auth
    container_name: edusense_mqtt
    restart: always
    ports:
      - "1883:1883"
    env_file: .env
    volumes:
      - ./mosquitto/config/mosquitto.conf:/etc/mosquitto/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data/
    networks:
      - backend_net

  mqtt_worker:
    build: ./backend
    container_name: edusense_worker
    restart: always
    env_file: .env
    command: python worker.py
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - backend_net

  backend:
    build: ./backend
    container_name: edusense_backend
    restart: always
    env_file: .env
    command: uvicorn main:app --host 0.0.0.0 --port 5000 --workers 2
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - backend_net

  nginx:
    image: nginx:stable-alpine
    container_name: edusense_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - frontend_net
      - backend_net

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  postgres_data:
  mosquitto_data:
