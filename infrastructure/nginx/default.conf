server {
    listen 80;
    server_name localhost;

    # Головна сторінка (наш новий сучасний фронтенд)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Обробка API запитів (проксі на бекенд)
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Документація FastAPI (Swagger UI)
    location /docs {
        proxy_pass http://backend:5000/docs;
        proxy_set_header Host $host;
    }

    # Файл специфікації для Swagger
    location /openapi.json {
        proxy_pass http://backend:5000/openapi.json;
        proxy_set_header Host $host;
    }
}
